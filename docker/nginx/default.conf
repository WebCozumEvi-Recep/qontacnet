# QONTAC.NET — Next.js reverse proxy + TLS
# 80 -> 443 yönlendirme, www -> apex, qontac.net -> Next.js (app:3000)

upstream qontac_app {
    server app:3000;
}

server {
    listen 80;
    server_name qontac.net www.qontac.net;
    return 301 https://qontac.net$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.qontac.net;

    ssl_certificate /etc/letsencrypt/live/qontac.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qontac.net/privkey.pem;

    return 301 https://qontac.net$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name qontac.net;

    ssl_certificate /etc/letsencrypt/live/qontac.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qontac.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Cloudflare gerçek IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    # Next.js statik dosyaları (uzun cache)
    location /_next/static/ {
        proxy_pass http://qontac_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://qontac_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
